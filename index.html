<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodhi Centro Holístico</title>
  <meta name="description" content="Bodhi Centro Holístico — Sitio temporalmente inactivo." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --warm-white: #FAF8F5;
      --espresso: #2C1F14;
      --clay: #A0614A;
      --taupe: #8C7B6E;
      --sand: #D4C9BC;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
    }
    html, body { height: 100%; }
    body {
      background-color: var(--warm-white);
      color: var(--espresso);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(160,97,74,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(212,201,188,0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1.2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-wrap { margin-bottom: 48px; animation: fadeUp 1.2s ease 0.1s both; }
    .logo-wrap img { height: 44px; opacity: 0.85; }
    .divider { width: 32px; height: 1px; background: var(--clay); margin: 0 auto 36px; animation: fadeUp 1.2s ease 0.2s both; }
    .status { font-family: var(--font-sans); font-size: 11px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--clay); margin-bottom: 24px; animation: fadeUp 1.2s ease 0.3s both; }
    .message { font-family: var(--font-serif); font-size: clamp(18px,2.5vw,22px); font-weight: 300; line-height: 1.8; color: var(--espresso); margin-bottom: 16px; animation: fadeUp 1.2s ease 0.4s both; }
    .submessage { font-family: var(--font-sans); font-size: 14px; font-weight: 300; color: var(--taupe); line-height: 1.7; margin-bottom: 48px; animation: fadeUp 1.2s ease 0.5s both; }
    .divider-bottom { width: 32px; height: 1px; background: var(--sand); margin: 0 auto 36px; animation: fadeUp 1.2s ease 0.6s both; }
    .contact { display: flex; align-items: center; justify-content: center; gap: 28px; flex-wrap: wrap; animation: fadeUp 1.2s ease 0.7s both; }
    .contact a { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 13px; font-weight: 400; letter-spacing: 0.06em; color: var(--taupe); text-decoration: none; text-transform: uppercase; transition: color 0.3s ease; }
    .contact a:hover { color: var(--clay); }
    .contact a svg { width: 16px; height: 16px; flex-shrink: 0; }
    .contact-sep { width: 1px; height: 14px; background: var(--sand); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="logo-dark.png" alt="Bodhi Centro Holístico" />
    </div>
    <div class="divider"></div>
    <p class="status">Sitio temporalmente inactivo</p>
    
    <p class="submessage">Para consultas comunicate con nosotros<br>por Instagram o WhatsApp.</p>
    <div class="divider-bottom"></div>
    <div class="contact">
      <a href="https://instagram.com/bodhicentroholistico" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
        @bodhicentroholistico
      </a>
      <div class="contact-sep"></div>
      <a href="https://wa.me/5491130229096" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        +54 911 3022 9096
      </a>
    </div>
  </div>
</body>
</html>
